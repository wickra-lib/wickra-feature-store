name: CI

# Workspace CI. The feature-store core and the reference CLI make up the
# workspace so far; the C ABI and the ten language bindings each add their own
# job to this file as they land (P-FS-3). Every job here must stay green.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.features }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        features: ["--all-features", "--no-default-features"]
    runs-on: ${{ matrix.os }}
    # The CLI binary (wickra-feature-store) and the C ABI cdylib
    # (wickra_feature_store) share a stem on Windows, so building both in one
    # --workspace pass can race on the same .pdb and trip LNK1201. Dropping debug
    # info removes the collision and keeps runner disk use down; the C ABI crate
    # is built and tested on its own in the `c-abi` job.
    env:
      RUSTFLAGS: "-C debuginfo=0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The PyO3 extension cdylib is built and tested by the `python` job via
      # maturin; the C ABI cdylib by the `c-abi` job. Exclude both here.
      - run: cargo build --workspace ${{ matrix.features }} --exclude wickra-feature-store-c --exclude wickra-feature-store-python
      - run: cargo test --workspace ${{ matrix.features }} --exclude wickra-feature-store-c --exclude wickra-feature-store-python

  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

  msrv:
    name: MSRV workspace (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.86"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Default features only: `arrow`/`parquet` are native-optional columnar
      # output whose own MSRV rolls ahead of ours and is not part of the 1.86
      # guarantee. The Python binding needs maturin's platform link flags and is
      # built by the `python` job. The Node binding is Rust 1.88 (napi-build) and
      # is gated by `msrv-node`. The core, CLI and C ABI stay at 1.86.
      - run: cargo build --workspace --exclude wickra-feature-store-python --exclude wickra-feature-store-node

  msrv-node:
    name: MSRV node (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The Node binding's napi-build needs Rust >= 1.88, above the workspace
      # 1.86 minimum, so it gets its own MSRV gate.
      - run: cargo build -p wickra-feature-store-node

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cargo-deny
      - run: cargo deny check

  cli:
    name: CLI smoke (JSON + Parquet)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C debuginfo=0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The columnar (`arrow`) output is opt-in; build the binary the released
      # binary ships as, then exercise both the text and the columnar paths.
      - run: cargo build -p wickra-feature-store --features arrow
      - name: Run end-to-end
        run: |
          mkdir -p smoke/data
          printf 'ts,open,high,low,close,volume\n1,100,101,99,100,10\n2,100,102,99,101,11\n3,101,103,100,102,12\n' > smoke/data/AAA.csv
          printf '%s' '{ "universe": ["AAA"], "features": [ {"kind":"indicator","name":"Sma","params":[2]}, {"kind":"price","field":"close"} ], "labels": [ {"kind":"forward_return","horizon":1} ] }' > smoke/spec.json
          ./target/debug/wickra-feature-store --spec smoke/spec.json --data smoke/data --format json
          ./target/debug/wickra-feature-store --spec smoke/spec.json --data smoke/data --format parquet --out smoke/out.parquet
          test -s smoke/out.parquet
          head -c 4 smoke/out.parquet | grep -q PAR1

  c-abi:
    name: C ABI on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cbindgen
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cbindgen
      - name: Build the C ABI library (cdylib + staticlib)
        run: cargo build -p wickra-feature-store-c --release
      - name: Rust unit tests
        run: cargo test -p wickra-feature-store-c
      # The generated header is platform-independent, so checking drift on one OS
      # is enough — and avoids a spurious CRLF/LF diff on the Windows runner.
      - name: Check the generated C header is in sync
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd bindings/c
          cbindgen --config cbindgen.toml --crate wickra-feature-store-c --output /tmp/wickra_feature_store.h
          diff -u include/wickra_feature_store.h /tmp/wickra_feature_store.h

  python:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: pip install maturin pytest
      - run: maturin build --out dist
        working-directory: bindings/python
      - run: pip install --no-index --find-links bindings/python/dist wickra-feature-store
      - run: pytest bindings/python/tests -q

  node:
    name: Node ${{ matrix.node-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["22", "24"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: bindings/node/package-lock.json
      # npm install (not npm ci): the per-platform optionalDependencies point at
      # native packages that are not published until the first release.
      - name: Install Node dependencies
        run: cd bindings/node && npm install --no-audit --no-fund
      - name: Build native module
        run: cd bindings/node && npx napi build --platform --release
      # The generated glue is platform-independent, so a drift check on one OS is
      # enough — and avoids a spurious CRLF/LF diff on the Windows runner.
      - name: Check index.js / index.d.ts are in sync
        if: runner.os == 'Linux'
        run: cd bindings/node && git diff --exit-code -- index.js index.d.ts
      - name: Run Node tests
        run: cd bindings/node && node --test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cargo-llvm-cov
      # The determinism moat lives in feature-store-core: the fold, the label
      # formulas, canonical serialization and scaling. Measure it in isolation so
      # patch coverage tracks the core.
      - name: Generate coverage (lcov)
        run: cargo llvm-cov -p feature-store-core --all-features --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
