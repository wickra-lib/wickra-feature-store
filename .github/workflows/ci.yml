name: CI

# Workspace CI. The feature-store core and the reference CLI make up the
# workspace so far; the C ABI and the ten language bindings each add their own
# job to this file as they land (P-FS-3). Every job here must stay green.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.features }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        features: ["--all-features", "--no-default-features"]
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: "-C debuginfo=0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build --workspace ${{ matrix.features }}
      - run: cargo test --workspace ${{ matrix.features }}

  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

  msrv:
    name: MSRV workspace (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.86"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Default features only: `arrow`/`parquet` are native-optional columnar
      # output whose own MSRV rolls ahead of ours and is not part of the 1.86
      # guarantee. The parallel and WASM-sequential paths are what MSRV covers.
      - run: cargo build --workspace

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cargo-deny
      - run: cargo deny check

  cli:
    name: CLI smoke (JSON + Parquet)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C debuginfo=0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The columnar (`arrow`) output is opt-in; build the binary the released
      # binary ships as, then exercise both the text and the columnar paths.
      - run: cargo build -p wickra-feature-store --features arrow
      - name: Run end-to-end
        run: |
          mkdir -p smoke/data
          printf 'ts,open,high,low,close,volume\n1,100,101,99,100,10\n2,100,102,99,101,11\n3,101,103,100,102,12\n' > smoke/data/AAA.csv
          printf '%s' '{ "universe": ["AAA"], "features": [ {"kind":"indicator","name":"Sma","params":[2]}, {"kind":"price","field":"close"} ], "labels": [ {"kind":"forward_return","horizon":1} ] }' > smoke/spec.json
          ./target/debug/wickra-feature-store --spec smoke/spec.json --data smoke/data --format json
          ./target/debug/wickra-feature-store --spec smoke/spec.json --data smoke/data --format parquet --out smoke/out.parquet
          test -s smoke/out.parquet
          head -c 4 smoke/out.parquet | grep -q PAR1

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cargo-llvm-cov
      # The determinism moat lives in feature-store-core: the fold, the label
      # formulas, canonical serialization and scaling. Measure it in isolation so
      # patch coverage tracks the core.
      - name: Generate coverage (lcov)
        run: cargo llvm-cov -p feature-store-core --all-features --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
